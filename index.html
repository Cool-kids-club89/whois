<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Full OSINT Lookup</title>
  <link rel="stylesheet" href="style.css">
  <script type="module" src="search.js" defer></script>
</head>
<body>
  <div class="container">
    <h1>Full OSINT Lookup</h1>
    <div class="search-box">
      <input type="text" id="usernameInput" placeholder="Enter username (e.g., 4zx16)">
      <button id="searchBtn">Search</button>
    </div>
    <div id="result" class="profile-container"></div>
  </div>

  <script>
    const input = document.getElementById("usernameInput");
    const btn = document.getElementById("searchBtn");
    const result = document.getElementById("result");

    // Check URL parameters for auto lookup
    const urlParams = new URLSearchParams(window.location.search);
    const userParam = urlParams.get('user');
    const user2Param = urlParams.get('user2');

    // If user parameters exist, skip input and search automatically
    if (userParam) {
      fetchProfileData(userParam, user2Param);
    }

    btn.onclick = async () => {
      const user = input.value.trim();
      if (!user) return;

      fetchProfileData(user);
    };

    async function fetchProfileData(user, user2) {
      result.innerHTML = `<h2>OSINT Lookup: ${user}</h2><p>Gathering data...</p>`;

      const profile = await fetchOSINTProfile(user, user2);

      if (!profile) {
        result.innerHTML += `<p>No data found for ${user}.</p>`;
        return;
      }

      displayProfile(user, profile);
    }

    function displayProfile(user, profile) {
      result.innerHTML = `<h2>OSINT Report for: ${user}</h2>`;

      // Profile Overview Section
      result.innerHTML += `
        <section>
          <h3>Profile Overview</h3>
          <p><strong>Description:</strong> ${profile.description || "No description available."}</p>
          <p><strong>Known Aliases:</strong> ${(profile.aliases || []).join(", ") || "None"}</p>
          <p><strong>Privacy & Security Rating:</strong> ${profile.opsecRating}</p>
        </section>
      `;

      // Links Section
      if (profile.links?.length) {
        result.innerHTML += `
          <section>
            <h3>Links</h3>
            <ul>
              ${profile.links.map(l => `<li><a href="${l.url}" target="_blank">${l.name}</a></li>`).join("")}
            </ul>
          </section>
        `;
      }

      // GitHub Section
      if (profile.github) {
        result.innerHTML += `
          <section>
            <h3>GitHub</h3>
            <p><strong>Username:</strong> ${profile.github.username}</p>
            <p><strong>Bio:</strong> ${profile.github.bio || "No bio"}</p>
            <p><strong>Public Repos:</strong> ${profile.github.public_repos || 0}</p>
          </section>
        `;
      }

      // Social Media Section
      if (profile.social) {
        result.innerHTML += `
          <section>
            <h3>Social Media</h3>
            <ul>
              ${profile.social.map(s => `<li><a href="${s.url}" target="_blank">${s.platform} — ${s.username}</a></li>`).join("")}
            </ul>
          </section>
        `;
      }

      // Search Results Section (if any)
      if (profile.searchResults) {
        result.innerHTML += `
          <section>
            <h3>Search Results</h3>
            <p>${profile.searchResults}</p>
          </section>
        `;
      }
    }

    async function fetchOSINTProfile(username, user2) {
      let profile = {};
      profile.opsecRating = "Unknown"; // Default OPSEC rating

      try {
        // Fetch GitHub Profile
        const githubRes = await fetch(`https://api.github.com/users/${username}`);
        if (githubRes.ok) {
          const gh = await githubRes.json();
          profile.github = { username: gh.login, bio: gh.bio, public_repos: gh.public_repos };
          evaluateOPSEC(profile, "github");
        }

        // Fetch Social Media Profiles (mocked for now)
        const socialMediaRes = await fetch(`https://api.socialsearch.com/?username=${username}`);
        if (socialMediaRes.ok) {
          const social = await socialMediaRes.json();
          profile.social = social;  // Mocked response, assume it returns social media profiles
          evaluateOPSEC(profile, "social");
        }

        // Search engine results for mentions of the user
        const searchRes = await fetch(`https://www.duckduckgo.com/?q=${username}`);
        if (searchRes.ok) {
          const searchData = await searchRes.text();
          profile.searchResults = searchData;  // Placeholder for parsed results
        }

        // Calculate OPSEC Rating based on gathered info
        profile.opsecRating = calculateOPSECRating(profile);

      } catch (err) {
        console.error("OSINT fetch error:", err);
      }

      return Object.keys(profile).length ? profile : null;
    }

    function evaluateOPSEC(profile, platform) {
      // Evaluate OPSEC based on the amount of data found on a platform
      if (platform === "github" && profile.github.public_repos > 5) {
        profile.opsecRating = "Bad OPSEC";
      } else if (platform === "social" && profile.social.length > 3) {
        profile.opsecRating = "Bad OPSEC";
      }
    }

    function calculateOPSECRating(profile) {
      // Rating based on the amount of information collected
      const infoCount = Object.keys(profile).length;
      if (infoCount > 5) {
        return "Bad OPSEC";  // Too much information exposed
      } else if (infoCount > 2) {
        return "Medium OPSEC";
      }
      return "Good OPSEC";  // Minimal information exposed
    }
  </script>
</body>
</html>
