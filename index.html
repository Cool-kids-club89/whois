<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Organization OSINT Lookup</title>
  <link rel="stylesheet" href="style.css">
  <script type="module" src="org.js" defer></script>
</head>
<body>
  <div class="container">
    <h1>Organization OSINT Lookup</h1>
    <div class="search-box">
      <input type="text" id="orgInput" placeholder="Enter organization name (e.g., GitHub)">
      <button id="searchBtn">Search</button>
    </div>
    <div id="result" class="profile-container"></div>
  </div>

  <script>
    const input = document.getElementById("orgInput");
    const btn = document.getElementById("searchBtn");
    const result = document.getElementById("result");

    // Listen for search button click
    btn.onclick = async () => {
      const orgName = input.value.trim();
      if (!orgName) return;

      result.innerHTML = `<h2>OSINT Lookup: ${orgName}</h2><p>Gathering data...</p>`;
      const orgProfile = await fetchOrgData(orgName);

      if (!orgProfile) {
        result.innerHTML += `<p>No data found for ${orgName}.</p>`;
        return;
      }

      displayOrgProfile(orgName, orgProfile);
    };

    // Display Organization Profile
    function displayOrgProfile(orgName, profile) {
      result.innerHTML = `<h2>Profile for: ${orgName}</h2>`;

      // Organization Overview Section
      result.innerHTML += `
        <section>
          <h3>Organization Overview</h3>
          <p><strong>Description:</strong> ${profile.description}</p>
          <p><strong>Website:</strong> <a href="${profile.website}" target="_blank">${profile.website}</a></p>
          <p><strong>Privacy & Security Rating:</strong> ${profile.opsecRating}</p>
        </section>
      `;

      // Repos Section
      if (profile.repos?.length) {
        result.innerHTML += `
          <section>
            <h3>Repositories</h3>
            <ul>
              ${profile.repos.map(repo => `<li><a href="${repo.url}" target="_blank">${repo.name}</a> - ${repo.language}</li>`).join("")}
            </ul>
          </section>
        `;
      }

      // Members Section
      if (profile.members?.length) {
        result.innerHTML += `
          <section>
            <h3>Members</h3>
            <ul>
              ${profile.members.map(member => `<li>${member}</li>`).join("")}
            </ul>
          </section>
        `;
      }

      // Owners Section
      if (profile.owners?.length) {
        result.innerHTML += `
          <section>
            <h3>Owners</h3>
            <ul>
              ${profile.owners.map(owner => `<li>${owner}</li>`).join("")}
            </ul>
          </section>
        `;
      }
    }
  </script>
</body>
</html>
