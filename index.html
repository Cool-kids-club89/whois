<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Full OSINT Lookup</title>
  <link rel="stylesheet" href="style.css">
  <script type="module" src="search.js" defer></script>
</head>
<body>
  <div class="container">
    <h1>Full OSINT Lookup</h1>
    <div class="search-box">
      <input type="text" id="usernameInput" placeholder="Enter username (e.g., 4zx16)">
      <button id="searchBtn">Search</button>
    </div>
    <div id="result" class="profile-container"></div>
  </div>

  <script>
    const input = document.getElementById("usernameInput");
    const btn = document.getElementById("searchBtn");
    const result = document.getElementById("result");

    btn.onclick = async () => {
      const user = input.value.trim();
      if (!user) return;

      result.innerHTML = `<h2>WHOIS Report: ${user}</h2><p>Gathering data...</p>`;

      // Try fetching live OSINT data
      const profile = await fetchOSINTProfile(user);

      if (!profile) {
        result.innerHTML += `<p>No data found for ${user}.</p>`;
        return;
      }

      displayProfile(user, profile);
    };

    function displayProfile(user, profile) {
      result.innerHTML = `<h2>WHOIS Report: ${user}</h2>`;

      result.innerHTML += `
        <section>
          <h3>Profile Overview</h3>
          <p><strong>Description:</strong> ${profile.description || "No description available."}</p>
          <p><strong>Known Aliases:</strong> ${(profile.aliases || []).join(", ") || "None"}</p>
        </section>
      `;

      if (profile.links?.length) {
        result.innerHTML += `
          <section>
            <h3>Links</h3>
            <ul>
              ${profile.links.map(l => `<li><a href="${l.url}" target="_blank">${l.name}</a></li>`).join("")}
            </ul>
          </section>
        `;
      }

      if (profile.music?.length) {
        result.innerHTML += `
          <section>
            <h3>Music Profiles</h3>
            <ul>
              ${profile.music.map(m => `<li><a href="${m.url}" target="_blank">${m.platform} — ${m.username}</a></li>`).join("")}
            </ul>
          </section>
        `;
      }

      if (profile.github) {
        result.innerHTML += `
          <section>
            <h3>GitHub</h3>
            <p><strong>Username:</strong> ${profile.github.username}</p>
            <p><strong>Bio:</strong> ${profile.github.bio || "No bio"}</p>
            <p><strong>Public Repos:</strong> ${profile.github.public_repos || 0}</p>
          </section>
        `;
      }

      if (profile.roblox) {
        result.innerHTML += `
          <section>
            <h3>Roblox</h3>
            <p><strong>ID:</strong> ${profile.roblox.id}</p>
            <p><strong>Username:</strong> ${profile.roblox.username}</p>
            <p><strong>Rank:</strong> ${profile.roblox.rank || "Unknown"}</p>
          </section>
        `;
      }

      // Any other custom scraping results or sources added can go here
    }

    async function fetchOSINTProfile(username) {
      let profile = {};

      // Step 1: Check local profiles (Fallback data)
      const localProfiles = {
        "4zx16": { description: "Underground Developer & Gray-Hat Technologist", aliases: ["4zx16"], links: [{name: "GitHub", url: "https://github.com/4zx16"}] },
        "7zh14": { description: "Multimedia Dev & Security Enthusiast", aliases: ["7zh14"], links: [{name: "GitHub", url: "https://github.com/7zh14"}] }
      };

      profile = localProfiles[username] || {};

      try {
        // Step 2: Fetch public data from GitHub
        const githubRes = await fetch(`https://api.github.com/users/${username}`);
        if (githubRes.ok) {
          const gh = await githubRes.json();
          profile.github = { username: gh.login, bio: gh.bio, public_repos: gh.public_repos };
        }

        // Step 3: Fetch public data from Roblox
        const robloxRes = await fetch(`https://api.roblox.com/users/get-by-username?username=${username}`);
        if (robloxRes.ok) {
          const rb = await robloxRes.json();
          if (!rb.errors) {
            profile.roblox = { id: rb.Id, username: rb.Username };
          }
        }

        // Step 4: Web scrape or fetch social media data (Instagram, Twitter, Reddit)
        const socialMediaRes = await fetch(`https://api.socialsearch.com/?username=${username}`);
        if (socialMediaRes.ok) {
          const social = await socialMediaRes.json();
          profile.social = social;  // Assuming the response gives social media profiles
        }

        // Step 5: Optional: Search engines to gather info (Google, DuckDuckGo, etc.)
        const searchRes = await fetch(`https://www.duckduckgo.com/?q=${username}`);
        if (searchRes.ok) {
          const searchData = await searchRes.text(); // Scrape or parse the result
          profile.searchResults = searchData;  // Placeholder for parsed results
        }

      } catch (err) {
        console.error("OSINT fetch error:", err);
      }

      return Object.keys(profile).length ? profile : null;
    }
  </script>
</body>
</html>
